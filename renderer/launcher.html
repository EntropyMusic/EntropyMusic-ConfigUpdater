<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      rel="icon"
      href="assets/images/EntropyMusic/logoico_tpbg.svg"
      type="image/svg+xml"
    />
    <title data-i18n="pages.launcher.title">Select Device - Entropy Music Firmware</title>

    <link rel="stylesheet" href="css/main.css" />
    <!-- App-owned settings panel styles (renderer/app/, not vendored by sync). -->
    <link rel="stylesheet" href="app/Settings.css" />
    <style>
      :root { --header-height: 0px; }
      main { padding-top: 0; }

      .Launcher-settings {
        position: fixed;
        top: var(--spacing-lg);
        right: var(--spacing-lg);
        z-index: 10;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--color-border-light);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--color-text-primary);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        transition: background var(--transition-fast),
          border-color var(--transition-fast);
      }
      .Launcher-settings:hover {
        background: rgba(255, 255, 255, 0.09);
        border-color: rgba(255, 255, 255, 0.5);
      }

      .Launcher {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: var(--spacing-2xl) var(--spacing-xl);
        gap: var(--spacing-2xl);
      }
      .Launcher-brand {
        display: inline-flex;
        align-items: center;
        line-height: 0;
      }
      .Launcher-brand img {
        height: 56px;
        width: auto;
        transition: opacity var(--transition-fast);
      }
      .Launcher-brand:hover img {
        opacity: 0.8;
      }
      .Launcher-title {
        margin: 0;
        font-size: var(--font-size-4xl);
        font-weight: var(--font-weight-extrabold);
        text-align: center;
      }
      .Launcher-subtitle {
        margin: 0;
        color: var(--color-text-muted);
        font-size: var(--font-size-base);
        text-align: center;
      }
      .Launcher-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: var(--spacing-lg);
        width: 100%;
        max-width: 1000px;
      }
      .DeviceCard {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--spacing-md);
        padding: var(--spacing-lg);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--color-border-light);
        border-radius: var(--border-radius-lg);
        color: var(--color-text-primary);
        cursor: pointer;
        text-decoration: none;
        transition: transform var(--transition-fast),
          border-color var(--transition-fast), background var(--transition-fast);
      }
      .DeviceCard:hover,
      .DeviceCard:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.09);
        outline: none;
      }
      .DeviceCard-thumb {
        width: 100%;
        height: 110px;
        object-fit: contain;
        pointer-events: none;
      }
      .DeviceCard-name {
        font-size: var(--font-size-lg);
        font-weight: var(--font-weight-semibold);
        text-align: center;
      }

      /* Auto-update banner — hidden until the updater reports something worth
         showing. Bottom-center, deliberately quiet to match the launcher. */
      .UpdateBanner {
        position: fixed;
        bottom: var(--spacing-lg);
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        align-items: center;
        gap: var(--spacing-md);
        max-width: calc(100vw - 2 * var(--spacing-lg));
        padding: var(--spacing-sm) var(--spacing-md);
        border: 1px solid var(--color-border-light);
        border-radius: 999px;
        background: rgba(20, 20, 20, 0.92);
        backdrop-filter: blur(6px);
        color: var(--color-text-primary);
        font-size: var(--font-size-sm);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      }
      .UpdateBanner.is-visible {
        display: inline-flex;
      }
      .UpdateBanner-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .UpdateBanner-action {
        flex: none;
        padding: 4px 12px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 999px;
        background: var(--color-text-primary);
        color: #000;
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-semibold);
        cursor: pointer;
      }
      .UpdateBanner-action:hover {
        opacity: 0.85;
      }
      .UpdateBanner-action[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <button
      type="button"
      class="Launcher-settings"
      data-open-settings
      aria-label="Open settings"
      title="Settings"
      data-i18n-title="pages.launcher.settings"
    >
      ⚙
    </button>
    <main>
      <div class="Launcher">
        <a
          class="Launcher-brand"
          href="https://entropymusic.cc"
          target="_blank"
          rel="noopener"
          title="Visit entropymusic.cc"
          data-i18n-title="pages.launcher.visitSite"
        >
          <img src="assets/images/EntropyMusic/logo_tpbg.svg" alt="Entropy Music" />
        </a>
        <div>
          <h1 class="Launcher-title" data-i18n="pages.launcher.heading">Select Your Device</h1>
          <p class="Launcher-subtitle" data-i18n="pages.launcher.subtitle">
            Choose a model to open its firmware configurator.
          </p>
        </div>
        <div class="Launcher-grid" id="deviceGrid"></div>
      </div>
    </main>

    <div class="UpdateBanner" id="updateBanner" role="status" aria-live="polite">
      <span class="UpdateBanner-text" id="updateText"></span>
      <button type="button" class="UpdateBanner-action" id="updateInstall" data-i18n="pages.launcher.update.install" hidden>
        Restart &amp; Install
      </button>
    </div>

    <script>
      // Auto-update status, relayed from the main process via preload (window.updater).
      // Harmless no-op if the bridge is absent (e.g. opened outside Electron).
      (() => {
        const updater = window.updater;
        if (!updater) return;

        const banner = document.getElementById("updateBanner");
        const text = document.getElementById("updateText");
        const installBtn = document.getElementById("updateInstall");

        const show = (msg, { action = false } = {}) => {
          text.textContent = msg;
          installBtn.hidden = !action;
          banner.classList.add("is-visible");
        };
        const hide = () => banner.classList.remove("is-visible");

        // Translate via the shared i18n engine when it is ready; fall back to
        // the English template (with the same {{param}} substitution) if a
        // status arrives before i18n has initialized.
        const tr = (key, fallback, params = {}) => {
          const ready = window.i18n && window.i18n.initialized;
          let str = ready ? window.i18n.t(key, params) : fallback;
          if (!ready) {
            for (const [k, v] of Object.entries(params)) {
              str = str.replace(new RegExp(`{{${k}}}`, "g"), v);
            }
          }
          return str;
        };

        installBtn.addEventListener("click", () => updater.install());

        updater.onStatus((status) => {
          switch (status.state) {
            case "available":
              show(
                tr("pages.launcher.update.available", "Downloading update {{version}}…", {
                  version: status.version ? "v" + status.version : "",
                })
              );
              break;
            case "downloading":
              show(
                tr("pages.launcher.update.downloading", "Downloading update… {{percent}}%", {
                  percent: status.percent ?? 0,
                })
              );
              break;
            case "downloaded":
              show(
                tr("pages.launcher.update.ready", "Update {{version}}ready.", {
                  version: status.version ? "v" + status.version + " " : "",
                }),
                { action: true }
              );
              break;
            // "checking", "up-to-date", and "error" stay silent on the launcher.
            default:
              hide();
          }
        });
      })();
    </script>

    <script type="module">
      import { PRODUCT_CONFIGS } from "./js/config/firmware-config.js";
      // i18n engine (vendored from the website) so the panel's language switch
      // works here too and the choice persists into the editor page.
      import "./js/i18n/i18n-core.js";
      import "./js/i18n/i18n-dom.js";
      // App-owned settings panel; self-attaches on load.
      import "./app/FirmwareSettingsPanel.js";

      const grid = document.getElementById("deviceGrid");

      const devices = Object.values(PRODUCT_CONFIGS).filter(
        (cfg) => cfg.visibility !== "hidden"
      );

      for (const cfg of devices) {
        const card = document.createElement("a");
        card.className = "DeviceCard";
        card.href = `index.html?product=${encodeURIComponent(cfg.id)}`;

        if (cfg.thumbnail) {
          const img = document.createElement("img");
          img.className = "DeviceCard-thumb";
          img.src = cfg.thumbnail;
          img.alt = cfg.displayName || cfg.name || cfg.id;
          img.loading = "lazy";
          card.appendChild(img);
        }

        const name = document.createElement("div");
        name.className = "DeviceCard-name";
        name.textContent = cfg.displayName || cfg.name || cfg.id;
        card.appendChild(name);

        grid.appendChild(card);
      }
    </script>
  </body>
</html>
