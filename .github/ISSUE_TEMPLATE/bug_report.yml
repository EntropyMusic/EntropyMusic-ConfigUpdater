name: Bug report
description: Report a problem with the Entropy Music Firmware Configurator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in every field —
        reports without reproduction steps and platform info usually can't be acted on.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exactly what you did, step by step, so we can hit the same bug.
      placeholder: |
        1. Open the app
        2. Select device '...'
        3. Click '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform tested on
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 15.5, Windows 11 23H2, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Shown in the app's About / settings, or the release you downloaded.
      placeholder: "e.g. 0.1.4"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Entropy Music device
      description: Which hardware model were you configuring? (or "none / not connected")
      placeholder: "e.g. Entropy Music ..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or error messages
      description: Paste any error text or drag in screenshots. Logs are auto-formatted, no backticks needed.
      render: shell
    validations:
      required: false
